<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#141210">
<title>Bollr</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --melis:#f7efdd;--melis-2:#efe3c8;--kanel:#6f4a2f;--kanel-deep:#4e3220;
    --kard:#141210;--stone:#8a7d6d;--hair:rgba(20,18,16,.10);--hair-2:rgba(20,18,16,.06);
  }
  html,body{background:var(--kard)}
  body{font-family:'Inter',-apple-system,system-ui,sans-serif;color:var(--kard);background:var(--melis);-webkit-font-smoothing:antialiased;line-height:1.55;padding:env(safe-area-inset-top) 0 0;overflow-x:hidden}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--melis);position:relative;padding-bottom:110px}

  .top{position:sticky;top:0;z-index:30;background:var(--melis);padding:calc(env(safe-area-inset-top) + 18px) 24px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--hair-2)}
  .brand{display:flex;align-items:center;gap:11px}
  .brand svg{width:30px;height:30px;display:block}
  .brand .wm{font-family:'Fraunces',serif;font-weight:300;font-size:26px;letter-spacing:.05em;color:var(--kard);line-height:1}
  .brand .wm b{font-weight:400}
  .brand .lockup{display:flex;flex-direction:column;gap:3px}
  .brand .tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone);font-weight:500}
  .me{width:36px;height:36px;border-radius:50%;border:1px solid var(--hair);background:none;color:var(--kanel);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Fraunces',serif}

  .head{padding:30px 24px 10px}
  .head h1{font-family:'Fraunces',serif;font-weight:300;font-size:32px;letter-spacing:0;margin-top:0;line-height:1.08}
  .head p{font-size:13.5px;color:var(--stone);margin-top:10px;line-height:1.6;max-width:340px}
  .head .meta-line{font-size:11px;color:var(--stone);margin-top:8px;letter-spacing:.04em}

  .search-wrap{padding:14px 24px 0}
  .search-wrap input{width:100%;border:1px solid var(--hair);border-radius:3px;padding:10px 14px;font-size:14px;font-family:'Inter';background:var(--melis-2);color:var(--kard)}
  .search-wrap input:focus{outline:none;border-color:var(--kanel)}
  .search-wrap input::placeholder{color:var(--stone);opacity:.7}

  .chips{display:flex;gap:8px;padding:12px 24px;overflow-x:auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{border:1px solid var(--hair);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--stone);background:none;cursor:pointer;white-space:nowrap;font-family:'Inter'}
  .chip.on{background:var(--kard);color:var(--melis);border-color:var(--kard)}

  .list{padding:8px 24px}
  .entry{padding:18px 0;border-bottom:1px solid var(--hair-2);cursor:pointer;display:flex;align-items:flex-start;gap:14px}
  .entry:last-child{border-bottom:none}
  .rank{font-family:'Fraunces',serif;font-weight:300;font-size:15px;color:var(--stone);min-width:26px;font-variant-numeric:tabular-nums;padding-top:3px}
  .entry .body{flex:1;min-width:0}
  .entry h3{font-family:'Fraunces',serif;font-weight:400;font-size:20px;line-height:1.15}
  .entry .meta{font-size:12px;color:var(--stone);margin-top:4px}
  .entry .meta .type{color:var(--kanel);font-weight:500}
  .entry .meta .dot{margin:0 6px;opacity:.4}
  .entry .acts{display:flex;gap:14px;margin-top:10px}
  .entry .rgt{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .entry-thumb{width:58px;height:58px;border-radius:3px;object-fit:cover;flex-shrink:0;background:var(--melis-2)}
  .score{font-family:'Fraunces',serif;font-weight:400;font-size:26px;line-height:1;color:var(--kard);font-variant-numeric:tabular-nums}
  .score small{font-size:12px;color:var(--stone)}
  .cnt{font-size:10.5px;color:var(--stone);letter-spacing:.04em}
  .ln{background:none;border:none;padding:0;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--kanel);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Inter'}
  .ln svg{width:13px;height:13px}
  .ln.wish.on{color:var(--kanel-deep)}

  .sec{padding:24px 24px 4px}
  .sec .ey{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--kanel);font-weight:600}

  .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;background:var(--melis);border-top:1px solid var(--hair);padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:center;z-index:35}
  .nav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--stone);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:2px 6px;font-family:'Inter'}
  .nav button svg{width:20px;height:20px;stroke-width:1.6}
  .nav button.on{color:var(--kard)}
  .nav .plus{background:var(--kard);color:var(--melis);width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .nav .plus svg{width:22px;height:22px;stroke-width:1.8}

  .empty{text-align:center;padding:60px 40px;color:var(--stone)}
  .empty .serif{font-size:20px;color:var(--kard);display:block;margin-bottom:8px;font-weight:300;font-family:'Fraunces',serif}
  .empty p{font-size:13.5px;line-height:1.6}

  .scrim{position:fixed;inset:0;background:rgba(20,18,16,.5);opacity:0;pointer-events:none;transition:.3s;z-index:50;backdrop-filter:blur(3px)}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;z-index:60;background:var(--melis);border-top-left-radius:8px;border-top-right-radius:8px;transform:translateY(100%);transition:transform .34s cubic-bezier(.22,1,.36,1);max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 24px calc(32px + env(safe-area-inset-bottom))}
  .sheet.open{transform:translateY(0)}
  .grab{width:36px;height:4px;background:var(--hair);border-radius:2px;margin:12px auto 20px}
  .sheet h2{font-family:'Fraunces',serif;font-weight:300;font-size:26px}
  .sheet .lead{font-size:13px;color:var(--stone);margin:6px 0 20px}

  .field{margin-bottom:18px;position:relative}
  .field label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--kanel);margin-bottom:9px}
  .field input,.field textarea{width:100%;border:none;border-bottom:1px solid var(--hair);border-radius:0;padding:8px 0;font-size:16px;font-family:'Fraunces',serif;font-weight:300;color:var(--kard);background:none}
  .field textarea{font-family:'Inter';font-size:14px;resize:none;height:52px;line-height:1.5}
  .field input:focus,.field textarea:focus{outline:none;border-bottom-color:var(--kanel)}
  .field input::placeholder,.field textarea::placeholder{color:var(--stone);opacity:.6}

  .suggest-list{border:1px solid var(--hair);border-radius:3px;margin-top:2px;background:var(--melis);display:none;position:absolute;left:0;right:0;z-index:10}
  .suggest-item{padding:11px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--hair-2);font-family:'Fraunces',serif;font-weight:300}
  .suggest-item:last-child{border-bottom:none}
  .suggest-item span{color:var(--stone);font-size:12px;font-family:'Inter';margin-left:6px}
  .suggest-item:active{background:var(--melis-2)}
  .suggest-hint{padding:8px 14px;font-size:11px;color:var(--stone);letter-spacing:.06em;border-bottom:1px solid var(--hair-2)}

  /* Slider */
  .slider-wrap{margin:8px 0 24px}
  .slider-num{font-family:'Fraunces',serif;font-weight:300;font-size:48px;line-height:1;text-align:center;color:var(--kard);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .slider-num small{font-size:18px;color:var(--stone)}
  .slider-num.empty{color:var(--stone);font-size:32px}
  .range-wrap{position:relative;padding:8px 0}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--melis-2);border-radius:2px;outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:var(--kard);cursor:pointer;border:3px solid var(--melis);box-shadow:0 1px 6px rgba(0,0,0,.25)}
  input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--kard);cursor:pointer;border:3px solid var(--melis);box-shadow:0 1px 6px rgba(0,0,0,.25)}
  .range-labels{display:flex;justify-content:space-between;font-size:10.5px;color:var(--stone);margin-top:6px;font-variant-numeric:tabular-nums}

  /* Tags */
  .tag-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .tag-chip{border:1px solid var(--hair);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--stone);background:none;cursor:pointer;font-family:'Inter';transition:.12s}
  .tag-chip.on{background:var(--kard);color:var(--melis);border-color:var(--kard)}

  /* Foto */
  .photo-wrap{margin-bottom:20px}
  .photo-preview{width:100%;height:180px;object-fit:cover;border-radius:3px;display:none;margin-bottom:8px}
  .photo-preview.show{display:block}
  .photo-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px;border:1px dashed var(--hair);border-radius:3px;background:none;color:var(--stone);font-size:13px;cursor:pointer;font-family:'Inter'}
  .photo-btn svg{width:18px;height:18px;flex-shrink:0;stroke:var(--kanel)}
  .photo-btn.has-photo{border-style:solid;color:var(--kard)}

  .btn{width:100%;background:var(--kard);color:var(--melis);border:none;border-radius:3px;padding:16px;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'Inter'}
  .btn:disabled{opacity:.3}
  .btn.ghost{background:none;color:var(--kanel);border:1px solid var(--hair);margin-top:10px}
  .btn.danger{background:none;color:#c0392b;border:1px solid rgba(192,57,43,.25);margin-top:10px}

  /* Detaljside */
  .detail-score{display:flex;align-items:baseline;gap:10px;margin:14px 0 20px}
  .detail-score .big{font-family:'Fraunces',serif;font-weight:300;font-size:60px;line-height:1;color:var(--kard)}
  .detail-score .of{font-family:'Fraunces',serif;font-size:20px;color:var(--stone)}
  .detail-score .ct{font-size:12px;color:var(--stone);margin-left:4px}
  .detail-photo{width:100%;max-height:240px;object-fit:cover;border-radius:3px;margin-bottom:16px}
  .my-score-box{background:var(--melis-2);border-radius:3px;padding:14px;margin:16px 0}
  .my-score-box .ms-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--stone);font-weight:600;margin-bottom:8px}
  .my-score-box .ms-val{font-family:'Fraunces',serif;font-size:28px;font-weight:300}

  /* Login */
  .login{padding:36px 24px 10px;text-align:center}
  .login .mk{width:56px;height:56px;margin:0 auto 22px}
  .login h2{font-family:'Fraunces',serif;font-weight:300;font-size:28px}
  .login .login-tag{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--kanel);font-weight:600;margin-top:10px}
  .login p{font-size:13.5px;color:var(--stone);margin:10px auto 28px;max-width:300px;line-height:1.6}
  .sso{display:flex;flex-direction:column;gap:10px;text-align:left}
  .sso button{display:flex;align-items:center;gap:12px;width:100%;padding:15px 18px;border-radius:3px;font-size:14.5px;font-weight:500;cursor:pointer;border:1px solid var(--hair);background:var(--melis);color:var(--kard);font-family:'Inter'}
  .sso button svg{width:18px;height:18px}
  .login .fine{font-size:11px;color:var(--stone);margin-top:20px;line-height:1.5}
  .email-divider{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);text-align:center;margin:20px 0 16px;position:relative}
  .email-divider::before,.email-divider::after{content:"";position:absolute;top:50%;width:28%;height:1px;background:var(--hair)}
  .email-divider::before{left:0}.email-divider::after{right:0}

  /* Profil */
  .stats{padding:24px 24px 8px;border-top:1px solid var(--hair-2);margin-top:12px}
  .stats .ey{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--kanel);font-weight:600;margin-bottom:14px}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat-box{background:var(--melis-2);border-radius:3px;padding:14px}
  .stat-box .sv{font-family:'Fraunces',serif;font-size:30px;font-weight:300;line-height:1}
  .stat-box .sl{font-size:11px;color:var(--stone);margin-top:4px;letter-spacing:.04em}

  /* Statistikk-fane */
  .global-stats{display:flex;gap:10px;padding:12px 24px 0;overflow-x:auto;scrollbar-width:none}
  .global-stats::-webkit-scrollbar{display:none}
  .gstat{background:var(--melis-2);border-radius:3px;padding:10px 14px;flex-shrink:0;min-width:100px}
  .gstat .gv{font-family:'Fraunces',serif;font-size:15px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
  .gstat .gl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);margin-top:3px}
  .sec{padding:24px 24px 4px}
  .sec .ey{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--kanel);font-weight:600}

  .toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--kard);color:var(--melis);padding:12px 22px;border-radius:3px;font-size:12.5px;letter-spacing:.03em;opacity:0;pointer-events:none;transition:.3s;z-index:80;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}
</style>
</head>
<body>

  <div class="top">
    <div class="brand">
      <svg viewBox="0 0 30 30" fill="none" id="brandMark"></svg>
      <span class="lockup">
        <span class="wm">boll<b>r</b></span>
        <span class="tag">For deg som tar boller på alvor</span>
      </span>
    </div>
    <button class="me" id="meBtn" onclick="go('profile')">·</button>
  </div>
  <div id="views"></div>
</div>

<div class="nav">
  <button class="on" id="nav-top" onclick="go('top')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 20V10M12 20V5M18 20v-8"/></svg>Toppliste
  </button>
  <button id="nav-stats" onclick="go('stats')">

  </button>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>

  <button id="nav-smaksliste" onclick="go('smaksliste')">

  </button>
  <button id="nav-profile" onclick="go('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Mitt
  </button>

<div class="toast" id="toast"></div>
<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(this)">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://zijxangdvhpghzracztf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppanhhbmdkdmhwZ2h6cmFjenRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0MzAxOTUsImV4cCI6MjEwMDAwNjE5NX0.Cp4QW3q0c-VdylRZhgrFP0OhQkbQaf-X5hEKCPjOQxQ';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function spiralPath(cx,cy,turns,sr,er,sd,steps=260){
  const sa=sd*Math.PI/180,ta=turns*2*Math.PI,pts=[];
  for(let i=0;i<=steps;i++){const t=i/steps,ang=sa+t*ta,r=sr+(er-sr)*t;pts.push([cx+r*Math.cos(ang),cy+r*Math.sin(ang)]);}
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const mx=(Math.min(...xs)+Math.max(...xs))/2,my=(Math.min(...ys)+Math.max(...ys))/2;
  const c=pts.map(p=>[p[0]+cx-mx,p[1]+cy-my]);
  let d=`M ${c[0][0].toFixed(2)} ${c[0][1].toFixed(2)} `;
  for(let i=1;i<c.length-1;i++){const nx=(c[i][0]+c[i+1][0])/2,ny=(c[i][1]+c[i+1][1])/2;d+=`Q ${c[i][0].toFixed(2)} ${c[i][1].toFixed(2)} ${nx.toFixed(2)} ${ny.toFixed(2)} `;}
  d+=`L ${c[c.length-1][0].toFixed(2)} ${c[c.length-1][1].toFixed(2)}`;
  return d;
}
document.getElementById('brandMark').innerHTML=
  `<path d="${spiralPath(15,15,2.8,1.2,12,205)}" fill="none" stroke="#6f4a2f" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>`;

const TAGS=['Luftig','Saftig','Sprø kant','God topping','Godt fylt','Stor størrelse','Autentisk','Nybakt','God pris','Sterk kardemomme','Klassisk','Nyskapende'];

let BAKERIES=[], MY_TASTED=new Set(), MY_WISHLIST=new Set();
let state={view:'top',user:null,draft:{score:null,bolleType:null,selectedBakeryName:null,selectedBakeryPlace:null,note:'',photoFile:null,photoUrl:null,tags:[]},editing:null};
let _searchTimer=null;
let searchQ='', filterType='';
let _ready=false;
const myRatingStore={};

function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}
function fmt(v){return v!=null?Number(v).toFixed(2):'–';}

// ─── Data ─────────────────────────────────────────────────
async function loadBakeries(){
  const {data,error}=await db.rpc('bakery_averages');
  if(error){console.error(error);return;}
  BAKERIES=data.map(b=>({...b,score:b.avg_score?+b.avg_score:null,count:+b.rating_count,wish:MY_WISHLIST.has(b.id)}));
}

async function loadUserData(){
  if(!state.user){MY_TASTED=new Set();MY_WISHLIST=new Set();return;}
  const uid=state.user.id;
  const [{data:r},{data:w}]=await Promise.all([
    db.from('ratings').select('bakery_id').eq('user_id',uid),
    db.from('wishlist').select('bakery_id').eq('user_id',uid),
  ]);
  MY_TASTED=new Set((r||[]).map(x=>x.bakery_id));
  MY_WISHLIST=new Set((w||[]).map(x=>x.bakery_id));
  BAKERIES.forEach(b=>b.wish=MY_WISHLIST.has(b.id));
}

// ─── Auth ─────────────────────────────────────────────────
db.auth.onAuthStateChange(async(_ev,session)=>{
  if(session?.user){
    state.user=session.user;
    state.user.name=(session.user.user_metadata?.full_name||session.user.email||'Bruker').split(' ')[0];
    document.getElementById('meBtn').textContent=state.user.name[0].toUpperCase();
    await loadUserData();
    BAKERIES.forEach(b=>b.wish=MY_WISHLIST.has(b.id));
  }else{
    state.user=null;MY_TASTED=new Set();MY_WISHLIST=new Set();
    BAKERIES.forEach(b=>b.wish=false);
    document.getElementById('meBtn').textContent='·';
  }
  if(_ready)render();
});

async function login(p){
  const {error}=await db.auth.signInWithOAuth({provider:p.toLowerCase(),options:{redirectTo:location.href.split('?')[0].split('#')[0]}});
  if(error)toast('Innlogging feilet');
}
async function loginEmail(){
  const email=document.getElementById('emailInput')?.value.trim();
  if(!email){toast('Skriv inn e-postadressen din');return;}
  const {error}=await db.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split('?')[0].split('#')[0]}});
  if(error){toast('Kunne ikke sende e-post');return;}
  toast('Sjekk innboksen — lenke er sendt!');
}
async function logout(){await db.auth.signOut();go('top');}

// ─── Routing ──────────────────────────────────────────────
function go(v){
  state.view=v;
  ['top','stats','smaksliste','profile'].forEach(k=>document.getElementById('nav-'+k)?.classList.toggle('on',v===k));
  render();window.scrollTo(0,0);
}
function render(){
  const el=document.getElementById('views');
  if(state.view==='top')el.innerHTML=viewTop();
  else if(state.view==='stats')el.innerHTML=viewStats();
  else if(state.view==='smaksliste')el.innerHTML=state.user?viewSmaksliste():viewSmakslisteLogin();
  else el.innerHTML=state.user?viewProfile():viewLogin();
}

// ─── Toppliste ────────────────────────────────────────────
function viewTop(){
  let list=[...BAKERIES];
  if(searchQ)list=list.filter(b=>b.name.toLowerCase().includes(searchQ)||b.place.toLowerCase().includes(searchQ));
  if(filterType)list=list.filter(b=>b.type===filterType);
  const ranked=[...list].sort((a,b)=>(b.score??-1)-(a.score??-1));
  const types=[...new Set(BAKERIES.map(b=>b.type))].sort();
  const recent=[...BAKERIES].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,4);
  const totalRatings=BAKERIES.reduce((s,b)=>s+b.count,0);

  return`<div class="head">
    <h1>Norges beste boller</h1>
    <p>Finn og ranger Norges beste boller.</p>
    <div class="meta-line">${BAKERIES.length} bakerier · ${totalRatings} vurderinger</div>
  </div>
  <div class="search-wrap"><input type="search" placeholder="Søk bakeri eller sted …" value="${esc(searchQ)}" oninput="setSearch(this.value)" autocomplete="off"></div>
  <div class="chips">
    <button class="chip ${!filterType?'on':''}" onclick="setFilter('')">Alle</button>
    ${types.map(t=>`<button class="chip ${filterType===t?'on':''}" onclick="setFilter('${esc(t)}')">${esc(t)}</button>`).join('')}
  </div>
  ${ranked.length
    ?`<div class="list">${ranked.map((b,i)=>entryHTML(b,{rank:i+1})).join('')}</div>`
    :`<div class="empty"><span class="serif">Ingen treff</span><p>Prøv et annet søk.</p></div>`}
  ${!searchQ&&!filterType&&recent.length?`
    <div class="sec"><div class="ey">Sist lagt til</div></div>
    <div class="list">${recent.map(b=>entryHTML(b)).join('')}</div>`:''}`;
}

function setSearch(q){
  searchQ=q.toLowerCase().trim();render();
  const input=document.querySelector('.search-wrap input');
  if(input){input.focus();const l=input.value.length;input.setSelectionRange(l,l);}
}
function setFilter(t){filterType=t;render();}

function entryHTML(b,opts={}){
  const rank=opts.rank?`<span class="rank">${String(opts.rank).padStart(2,'0')}</span>`:'';
  const thumb=b.photo_url?`<img class="entry-thumb" src="${esc(b.photo_url)}" loading="lazy">`:'';
  return`<div class="entry" onclick="openBakery('${b.id}')">
    ${rank}
    <div class="body">
      <h3>${esc(b.name)}</h3>
      <div class="meta"><span class="type">${esc(b.type)}</span><span class="dot">·</span>${esc(b.place)}</div>
      <div class="acts">
        <button class="ln wish ${b.wish?'on':''}" onclick="event.stopPropagation();toggleWish('${b.id}')">
          <svg viewBox="0 0 24 24" fill="${b.wish?'currentColor':'none'}" stroke="currentColor" stroke-width="1.6"><path d="M12 21C7 17 4 13.5 4 10a4 4 0 018-1 4 4 0 018 1c0 3.5-3 7-8 11z"/></svg>${b.wish?'Lagt til':'Smaksliste'}
        </button>
      </div>
    </div>
    <div class="rgt">
      ${thumb}
      <div class="score">${b.score!=null?b.score.toFixed(2):'–'}<small> /5</small></div>
      <div class="cnt">${b.count} ${b.count===1?'vurdering':'vurderinger'}</div>
    </div>
  </div>`;
}

// ─── Statistikk ───────────────────────────────────────────
function viewStats(){
  const totalRatings=BAKERIES.reduce((s,b)=>s+b.count,0);

  const placeMap={};
  BAKERIES.forEach(b=>{if(b.score==null)return;if(!placeMap[b.place])placeMap[b.place]={sum:0,n:0,ratings:0};placeMap[b.place].sum+=b.score;placeMap[b.place].n++;placeMap[b.place].ratings+=b.count;});
  const bestePlasser=Object.entries(placeMap).map(([p,v])=>({place:p,score:v.sum/v.n,bakeries:v.n,ratings:v.ratings})).sort((a,b)=>b.score-a.score).slice(0,6);

  const typeMap={};
  BAKERIES.forEach(b=>{if(b.score==null)return;if(!typeMap[b.type])typeMap[b.type]={sum:0,n:0};typeMap[b.type].sum+=b.score;typeMap[b.type].n++;});
  const besteTyper=Object.entries(typeMap).map(([t,v])=>({type:t,score:v.sum/v.n,n:v.n})).sort((a,b)=>b.score-a.score);

  const plasseListe=bestePlasser.map((p,i)=>`
    <div class="entry" style="cursor:default">
      <span class="rank">${String(i+1).padStart(2,'0')}</span>
      <div class="body"><h3 style="font-size:17px">${esc(p.place)}</h3>
        <div class="meta">${p.bakeries} ${p.bakeries===1?'bakeri':'bakerier'} · ${p.ratings} vurderinger</div>
      </div>
      <div class="rgt"><div class="score">${p.score.toFixed(2)}<small> /5</small></div></div>
    </div>`).join('');

  const typeListe=besteTyper.map((t,i)=>`
    <div class="entry" style="cursor:default">
      <span class="rank">${String(i+1).padStart(2,'0')}</span>
      <div class="body"><h3 style="font-size:17px">${esc(t.type)}</h3>
        <div class="meta">${t.n} ${t.n===1?'bakeri':'bakerier'}</div>
      </div>
      <div class="rgt"><div class="score">${t.score.toFixed(2)}<small> /5</small></div></div>
    </div>`).join('');

  return`<div class="head">
    <h1>Statistikk</h1>
    <p>Mønstre og innsikt fra alle vurderinger.</p>
    <div class="meta-line">${BAKERIES.length} bakerier · ${totalRatings} vurderinger</div>
  </div>
  ${!BAKERIES.length?`<div class="empty"><span class="serif">Ingen data ennå</span><p>Statistikken fylles ut etter hvert som bakerier registreres.</p></div>`:
  `${bestePlasser.length?`<div class="sec"><div class="ey">Beste byer</div></div><div class="list">${plasseListe}</div>`:''}
   ${besteTyper.length?`<div class="sec"><div class="ey">Beste bolletyper</div></div><div class="list">${typeListe}</div>`:''}`}`;
}

// ─── Detaljside ───────────────────────────────────────────
async function openBakery(id){
  const b=BAKERIES.find(x=>x.id===id);if(!b)return;
  let myRating=null;
  if(state.user&&MY_TASTED.has(id)){
    const {data}=await db.from('ratings').select('*').eq('bakery_id',id).eq('user_id',state.user.id).maybeSingle();
    myRating=data;
    if(myRating)myRatingStore[id]=myRating;
  }
  document.getElementById('sheet').innerHTML=detailHTML(b,myRating);
  openSheet();
}

function detailHTML(b,myRating){
  const hasPhoto=myRating?.photo_url;
  const rateBtn=state.user
    ?(MY_TASTED.has(b.id)
      ?`<button class="btn ghost" onclick="closeSheet();setTimeout(()=>openRate(BAKERIES.find(x=>x.id==='${b.id}'),myRatingStore['${b.id}']),50)">Rediger vurdering</button>`
      :`<button class="btn" onclick="closeSheet();setTimeout(()=>openRate(BAKERIES.find(x=>x.id==='${b.id}')),50)">Vurder denne bollen</button>`)
    :`<button class="btn" onclick="closeSheet();go('profile')">Logg inn for å vurdere</button>`;
  const deleteBtn=MY_TASTED.has(b.id)&&state.user?`<button class="btn danger" onclick="confirmDelete('${b.id}')">Slett min vurdering</button>`:'';

  return`<div class="grab"></div>
    ${hasPhoto?`<img class="detail-photo" src="${esc(hasPhoto)}" loading="lazy">`:''}
    <div style="font-size:13px;color:var(--stone);margin-bottom:4px">${esc(b.type)} · ${esc(b.place)}</div>
    <h2>${esc(b.name)}</h2>
    <div class="detail-score">
      <span class="big">${b.score!=null?b.score.toFixed(2):'–'}</span>
      <span class="of">/5</span>
      <span class="ct">${b.count} ${b.count===1?'vurdering':'vurderinger'}</span>
    </div>
    ${myRating?.score!=null?`<div class="my-score-box"><div class="ms-label">Din vurdering</div><div class="ms-val">${Number(myRating.score).toFixed(2)} / 5</div></div>`:''}
    ${myRating?.tags?.length?`<div class="tag-chips" style="margin-bottom:16px">${myRating.tags.map(t=>`<span class="tag-chip on">${esc(t)}</span>`).join('')}</div>`:''}
    ${myRating?.note?`<div style="font-size:13.5px;color:var(--stone);font-style:italic;margin-bottom:16px">"${esc(myRating.note)}"</div>`:''}
    <div style="margin-top:16px">${rateBtn}</div>
    <button class="btn ghost" onclick="shareBakery('${b.id}')">Del dette bakeriet</button>
    ${deleteBtn}`;
}

async function confirmDelete(bakeryId){
  if(!confirm('Slett din vurdering av dette bakeriet?'))return;
  const r=myRatingStore[bakeryId];
  if(r?.photo_url){
    const path=r.photo_url.split('/bolle-bilder/')[1];
    if(path)await db.storage.from('bolle-bilder').remove([path]);
  }
  const {error}=await db.from('ratings').delete().eq('bakery_id',bakeryId).eq('user_id',state.user.id);
  if(error){toast('Kunne ikke slette');return;}
  MY_TASTED.delete(bakeryId);delete myRatingStore[bakeryId];
  closeSheet();toast('Vurdering slettet');
  await loadBakeries();await loadUserData();render();
}

function shareBakery(id){
  const b=BAKERIES.find(x=>x.id===id);if(!b)return;
  const text=`${b.name} i ${b.place}${b.score!=null?' — '+b.score.toFixed(2)+'/5':''} på Bollr`;
  if(navigator.share)navigator.share({title:'Bollr',text,url:'https://bollr.no'});
  else navigator.clipboard?.writeText('https://bollr.no').then(()=>toast('Lenke kopiert'));
}

// ─── Vurderingsskjema ─────────────────────────────────────
function openRate(b,existingRating=null){
  if(!state.user){toast('Du må logge inn for å registrere en bolle');setTimeout(()=>go('profile'),800);return;}
  state.draft={
    score:existingRating?.score!=null?+existingRating.score:null,
    bolleType:b?.type||null,
    selectedBakeryName:null,
    selectedBakeryPlace:null,
    note:existingRating?.note||'',
    photoFile:null,
    photoUrl:existingRating?.photo_url||null,
    tags:existingRating?.tags||[],
  };
  state.editing=b||null;

  const sliderVal=state.draft.score??0;
  const hasScore=state.draft.score!=null;
  const tagChips=TAGS.map(t=>`<button class="tag-chip ${state.draft.tags.includes(t)?'on':''}" onclick="toggleTag('${esc(t)}')">${esc(t)}</button>`).join('');

  document.getElementById('sheet').innerHTML=`
    <div class="grab"></div>
    <h2>${b?esc(b.name):'Vurder en bolle'}</h2>
    <div class="lead">${b?esc(b.type)+' · '+esc(b.place):'Finn bakeriet og velg type bolle.'}</div>

    ${b?'':`
      <div class="field">
        <label>Bakeri</label>
        <input id="rName" placeholder="Navn på bakeri" oninput="updateBakerySearch(this.value)" autocomplete="off">
        <div class="suggest-list" id="bakerySuggestions"></div>
      </div>
      <div class="field">
        <label>Sted</label>
        <input id="rPlace" placeholder="By eller tettsted" oninput="updateSaveBtn()">
      </div>
      <div class="field">
        <label>Type bolle</label>
        <div id="bolleTypeInner">
          <input id="rNewBolleType" placeholder="Skriv inn type bolle …" oninput="updateNewBolleType(this.value)">
        </div>
      </div>`}

    <div class="field"><label>Score</label></div>
    <div class="slider-wrap">
      <div class="slider-num ${hasScore?'':'empty'}" id="sliderNum">${hasScore?Number(sliderVal).toFixed(2):'–'}<small>${hasScore?' / 5':''}</small></div>
      <div class="range-wrap">
        <input type="range" id="scoreSlider" min="0" max="5" step="0.25" value="${sliderVal}" oninput="updateSlider(this.value)">
      </div>
      <div class="range-labels"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
    </div>

    <div class="field"><label>Kommentar</label><textarea id="rNote" placeholder="Kardemomme? Sprø kant? Verdt en omvei?">${esc(state.draft.note)}</textarea></div>

    <div class="photo-wrap">
      <label style="display:block;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--kanel);margin-bottom:9px">Bilde</label>
      ${state.draft.photoUrl?`<img class="photo-preview show" id="photoPreview" src="${esc(state.draft.photoUrl)}">`:`<img class="photo-preview" id="photoPreview">`}
      <button class="photo-btn ${state.draft.photoUrl?'has-photo':''}" id="photoBtnLabel" onclick="document.getElementById('photoInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        ${state.draft.photoUrl?'Bytt bilde':'Ta bilde eller velg fra bibliotek'}
      </button>
    </div>

    <div class="field">
      <label>Stikkord</label>
      <div class="tag-chips" id="tagChips">${tagChips}</div>
    </div>

    <button class="btn" id="saveBtn" disabled onclick="saveRating()" style="margin-top:16px">${existingRating?'Oppdater vurdering':'Lagre vurdering'}</button>`;

  updateSaveBtn();
  openSheet();
}

function selectBolleType(t){
  state.draft.bolleType=t;
  const inp=document.getElementById('rNewBolleType');
  if(inp)inp.value='';
  document.querySelectorAll('#bolleChips .tag-chip').forEach(el=>el.classList.toggle('on',el.textContent===t));
  updateSaveBtn();
}

function updateNewBolleType(val){
  state.draft.bolleType=val.trim()||null;
  document.querySelectorAll('#bolleChips .tag-chip').forEach(el=>el.classList.remove('on'));
  updateSaveBtn();
}

function toggleTag(t){
  const i=state.draft.tags.indexOf(t);
  if(i>=0)state.draft.tags.splice(i,1);else state.draft.tags.push(t);
  document.querySelectorAll('#tagChips .tag-chip').forEach(el=>el.classList.toggle('on',state.draft.tags.includes(el.textContent)));
}

function updateSlider(val){
  const v=+val;
  state.draft.score=v;
  const el=document.getElementById('sliderNum');
  if(el){el.className='slider-num';el.innerHTML=v.toFixed(2)+'<small> / 5</small>';}
  updateSaveBtn();
}

function updateSaveBtn(){
  const hasScore=state.draft.score!=null;
  const btn=document.getElementById('saveBtn');
  if(!btn)return;
  if(state.editing){
    btn.disabled=!hasScore;
  }else{
    const name=document.getElementById('rName')?.value.trim();
    const place=document.getElementById('rPlace')?.value.trim();
    btn.disabled=!(hasScore&&name&&place&&state.draft.bolleType);
  }
}

function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  state.draft.photoFile=file;
  const preview=document.getElementById('photoPreview');
  const btn=document.getElementById('photoBtnLabel');
  if(preview){preview.src=URL.createObjectURL(file);preview.classList.add('show');}
  if(btn){btn.classList.add('has-photo');btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>Bytt bilde`;}
  input.value='';
}

async function uploadPhoto(file,bakeryId){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=`${state.user.id}/${bakeryId}/${Date.now()}.${ext}`;
  const {error}=await db.storage.from('bolle-bilder').upload(path,file,{cacheControl:'3600',upsert:true});
  if(error){console.error(error);return null;}
  const {data}=db.storage.from('bolle-bilder').getPublicUrl(path);
  return data.publicUrl;
}

function updateBakerySearch(q){
  state.draft.selectedBakeryName=null;
  state.draft.selectedBakeryPlace=null;
  state.draft.bolleType=null;
  clearTimeout(_searchTimer);
  const el=document.getElementById('bakerySuggestions');
  if(!el)return;
  if(q.length<2){el.style.display='none';renderBolleTypeSection();updateSaveBtn();return;}
  _searchTimer=setTimeout(()=>_showBakerySuggestions(q),200);
}

function _showBakerySuggestions(q){
  const el=document.getElementById('bakerySuggestions');
  if(!el)return;
  const seen=new Set();
  const matches=BAKERIES.filter(b=>{
    if(!b.name.toLowerCase().includes(q.toLowerCase()))return false;
    if(seen.has(b.name))return false;
    seen.add(b.name);return true;
  }).slice(0,6);
  if(matches.length){
    el.innerHTML=`<div class="suggest-hint">Bakerier i Bollr:</div>`+
      matches.map(b=>`<div class="suggest-item" onclick="selectExistingBakery(${JSON.stringify(b.name)})">${esc(b.name)}<span>${esc(b.place)}</span></div>`).join('');
    el.style.display='block';
  }else{
    el.style.display='none';
  }
}

function selectExistingBakery(name){
  const b=BAKERIES.find(x=>x.name===name);
  if(!b)return;
  state.draft.selectedBakeryName=name;
  state.draft.selectedBakeryPlace=b.place;
  state.draft.bolleType=null;
  document.getElementById('rName').value=name;
  document.getElementById('rPlace').value=b.place;
  document.getElementById('bakerySuggestions').style.display='none';
  renderBolleTypeSection();
  updateSaveBtn();
}

function renderBolleTypeSection(){
  const inner=document.getElementById('bolleTypeInner');
  if(!inner)return;
  const name=state.draft.selectedBakeryName;
  if(!name){
    inner.innerHTML=`<input id="rNewBolleType" placeholder="Skriv inn type bolle …" oninput="updateNewBolleType(this.value)">`;
    return;
  }
  const types=[...new Set(BAKERIES.filter(b=>b.name===name).map(b=>b.type))];
  const chips=types.map(t=>`<button class="tag-chip ${state.draft.bolleType===t?'on':''}" onclick="selectBolleType(${JSON.stringify(t)})">${esc(t)}</button>`).join('');
  inner.innerHTML=`
    <div class="tag-chips" id="bolleChips" style="margin-bottom:12px">${chips}</div>
    <input id="rNewBolleType" placeholder="Ny type bolle …" oninput="updateNewBolleType(this.value)">`;
}

async function saveRating(){
  if(!state.user){closeSheet();go('profile');return;}
  if(state.draft.score==null){toast('Sett en score først');return;}

  let bakeryId;
  if(state.editing){
    bakeryId=state.editing.id;
  }else{
    const name=(state.draft.selectedBakeryName||document.getElementById('rName')?.value.trim()||'').trim();
    const place=(state.draft.selectedBakeryPlace||document.getElementById('rPlace')?.value.trim()||'').trim()||'Ukjent';
    const type=state.draft.bolleType;
    if(!name){toast('Fyll inn navn på bakeri');return;}
    if(!type){toast('Velg eller skriv inn type bolle');return;}
    const existing=BAKERIES.find(b=>
      b.name.toLowerCase()===name.toLowerCase()&&
      b.type.toLowerCase()===type.toLowerCase()
    );
    if(existing){
      bakeryId=existing.id;
    }else{
      const {data,error}=await db.from('bakeries').insert({name,place,type}).select('id').single();
      if(error){toast('Kunne ikke lagre bakeri');return;}
      bakeryId=data.id;
    }
  }

  let photoUrl=state.draft.photoUrl||null;
  if(state.draft.photoFile){
    const url=await uploadPhoto(state.draft.photoFile,bakeryId);
    if(url)photoUrl=url;
  }

  const payload={
    bakery_id:bakeryId,user_id:state.user.id,
    score:state.draft.score,
    note:document.getElementById('rNote')?.value.trim()||null,
    photo_url:photoUrl,
  };
  if(state.draft.tags.length)payload.tags=state.draft.tags;
  const {error}=await db.from('ratings').upsert(payload,{onConflict:'bakery_id,user_id'});
  if(error){toast('Kunne ikke lagre vurdering');return;}

  MY_TASTED.add(bakeryId);
  closeSheet();toast('Vurderingen er lagret');
  await loadBakeries();await loadUserData();
  go('top');
}

// ─── Ønskeliste / Smaksliste ──────────────────────────────
async function toggleWish(id){
  if(!state.user){toast('Logg inn for å bruke smakslista');go('profile');return;}
  const b=BAKERIES.find(x=>x.id===id);if(!b)return;
  if(b.wish){
    const {error}=await db.from('wishlist').delete().eq('user_id',state.user.id).eq('bakery_id',id);
    if(!error){MY_WISHLIST.delete(id);b.wish=false;toast('Fjernet fra smakslista');}
  }else{
    const {error}=await db.from('wishlist').insert({user_id:state.user.id,bakery_id:id});
    if(!error){MY_WISHLIST.add(id);b.wish=true;toast('Lagt i smakslista');}
  }
  render();
}

// ─── Profil ───────────────────────────────────────────────
function viewLogin(){
  return`<div class="login">
    <svg class="mk" viewBox="0 0 56 56" fill="none"><path d="${spiralPath(28,28,2.8,2,23,205)}" fill="none" stroke="#6f4a2f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <h2>Bli med i Bollr</h2>
    <div class="login-tag">For deg som tar boller på alvor</div>
    <p>Logg inn for å lagre bollene du har smakt og din egen smaksliste.</p>
    <div class="sso">
      <button onclick="login('Google')">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.9a5 5 0 01-2.2 3.3v2.7h3.6c2.1-1.9 3.2-4.8 3.2-7.8z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.7c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.8A11 11 0 0012 23z"/><path fill="#FBBC05" d="M6 14.3a6.6 6.6 0 010-4.2V7.3H2.3a11 11 0 000 9.8z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1A11 11 0 002.3 7.3L6 10.1c.9-2.6 3.2-4.7 6-4.7z"/></svg>
        Fortsett med Google</button>
    </div>
    <div class="email-divider">eller logg inn med e-post</div>
    <div class="field" style="text-align:left">
      <label>E-post</label>
      <input type="email" id="emailInput" placeholder="din@epost.no" autocomplete="email">
    </div>
    <button class="btn" onclick="loginEmail()" style="margin-top:4px">Send innloggingslenke</button>
    <p class="fine">Du får en lenke på e-post — ingen passord nødvendig.</p>
  </div>`;
}

function viewProfile(){
  const tasted=BAKERIES.filter(b=>MY_TASTED.has(b.id));
  const wish=BAKERIES.filter(b=>b.wish);
  const tastedScored=tasted.filter(b=>b.score!=null);
  const avgMyScore=tastedScored.length?(tastedScored.reduce((s,b)=>s+b.score,0)/tastedScored.length).toFixed(2):'–';
  const topBakery=[...tastedScored].sort((a,b)=>b.score-a.score)[0];
  const uniquePlaces=new Set(tasted.map(b=>b.place)).size;

  return`<div class="head">
    <h1>Hei, ${esc(state.user.name)}</h1>
  </div>
  ${tasted.length?`<div class="list">${tasted.map(b=>entryHTML(b)).join('')}</div>`
    :`<div class="empty"><span class="serif">Ingen boller ennå</span><p>Trykk + for å vurdere din første bolle.</p></div>`}
  <div class="stats">
    <div class="ey">Din statistikk</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="sv">${tasted.length}</div><div class="sl">bakerier smakt</div></div>
      <div class="stat-box"><div class="sv">${avgMyScore}</div><div class="sl">snittkarakter</div></div>
      <div class="stat-box"><div class="sv">${uniquePlaces||'–'}</div><div class="sl">steder besøkt</div></div>
      <div class="stat-box"><div class="sv">${wish.length}</div><div class="sl">på smakslista</div></div>
      ${topBakery?`<div class="stat-box" style="grid-column:span 2"><div class="sv" style="font-size:13px;padding-top:2px">${esc(topBakery.name)}</div><div class="sl">din beste bolle · ${topBakery.score.toFixed(2)}/5</div></div>`:''}
    </div>
  </div>
  <div style="padding:16px 24px"><button class="btn ghost" onclick="logout()">Logg ut</button></div>`;
}

// ─── Sheet ────────────────────────────────────────────────
function openSheet(){document.getElementById('scrim').classList.add('open');document.getElementById('sheet').classList.add('open');}
function closeSheet(){document.getElementById('scrim').classList.remove('open');document.getElementById('sheet').classList.remove('open');}

// ─── Init ─────────────────────────────────────────────────
async function init(){await loadBakeries();_ready=true;go('top');}
init();
</script>
